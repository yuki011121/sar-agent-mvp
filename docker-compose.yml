# docker-compose.yml
version: "3.9"

# Define a network for our services to communicate
networks:
  sar-net:

volumes:
  qdrant_storage:

services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    container_name: redis
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - sar-net

  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    networks:
      - sar-net

  # --- SAR Agents ---
  photo-agent:
    build:
      context: .
      dockerfile: ./agents/photo_analysis/Dockerfile
    container_name: photo-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PHOTO_DEFENSE_ENABLED=${PHOTO_DEFENSE_ENABLED:-false}
      - HTTP_PORT=8006
    ports: ["8006:8006"]
    depends_on: [redis]
    networks:
      - sar-net

  history-agent:
    build:
      context: .
      dockerfile: ./agents/history/Dockerfile
    container_name: history-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_COLLECTION=SAR_context
      - QDRANT_URL=http://qdrant:6333
      - HISTORY_DEFENSE_ENABLED=${HISTORY_DEFENSE_ENABLED:-true}
      - HTTP_PORT=8004
    ports: ["8004:8004"]
    depends_on: [redis, qdrant]
    networks:
      - sar-net

  logistics-agent:
    build:
      context: .
      dockerfile: ./agents/logistics/Dockerfile
    container_name: logistics-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - UPDATE_INTERVAL_SECONDS=3600  # 1 hour
    depends_on: [redis]
    networks:
      - sar-net

  health-agent:
    build:
      context: .
      dockerfile: ./agents/health/Dockerfile
    container_name: health-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - UPDATE_INTERVAL_SECONDS=3600  # 1 hour
      - HTTP_PORT=8002
    ports: ["8002:8002"]
    depends_on: [redis]
    networks:
      - sar-net

  path-analysis-agent:
    build:
      context: .
      dockerfile: ./agents/path_analysis/Dockerfile
    container_name: path-analysis-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - GRAPH_RADIUS_KM=5.0
      - N_SIMULATIONS=200
      - HTTP_PORT=8003
    ports: ["8003:8003"]
    depends_on: [redis]
    networks:
      - sar-net

  weather-agent:
    build:
      context: .
      dockerfile: ./agents/weather/Dockerfile
    container_name: weather-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - HTTP_PORT=8001
    ports: ["8001:8001"]
    depends_on: [redis]
    networks:
      - sar-net
      
  interview-agent:
    build:
      context: .
      dockerfile: ./agents/interview/Dockerfile
    container_name: interview-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - HTTP_PORT=8005
    ports: ["8005:8005"]
    depends_on: [redis]
    networks:
      - sar-net

  cluemeister-agent:
    build:
      context: .
      dockerfile: ./agents/cluemeister/Dockerfile
    container_name: cluemeister-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - EXPORT_VISUALIZATIONS=${EXPORT_VISUALIZATIONS:-true}
      - VISUALIZATION_OUTPUT_DIR=/workspace/visualizations
    depends_on:
      - redis
    restart: on-failure
    volumes:
      - ./visualizations:/workspace/visualizations
    networks:
      - sar-net

  command-agent:
    build:
      context: .
      dockerfile: ./agents/command_agent/Dockerfile
    container_name: command-agent
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - COMMAND_AGENT_MODEL=${COMMAND_AGENT_MODEL:-gemini-2.5-flash}
      - COMMAND_AGENT_HTTP_PORT=8008
      - WEATHER_AGENT_URL=http://weather-agent:8001
      - HEALTH_AGENT_URL=http://health-agent:8002
      - PATH_AGENT_URL=http://path-analysis-agent:8003
      - HISTORY_AGENT_URL=http://history-agent:8004
      - INTERVIEW_AGENT_URL=http://interview-agent:8005
      - PHOTO_AGENT_URL=http://photo-agent:8006
    ports:
      - "8008:8008"
    depends_on: [redis, weather-agent, health-agent, path-analysis-agent, history-agent, interview-agent, photo-agent]
    networks:
      - sar-net
    restart: unless-stopped

  # ============================================================================
  # New Services for Integration
  # ============================================================================

  api-gateway:
    build:
      context: .
      dockerfile: ./agents/api_gateway/Dockerfile
    container_name: api-gateway
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - COMMAND_AGENT_URL=http://command-agent:8008
    ports:
      - "8080:8080"
    depends_on: [redis, command-agent]
    networks:
      - sar-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - sar-net
    restart: unless-stopped
